services:
  nutricore-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: nutricore-web:latest
    container_name: nutricore-web
    ports:
      - "8080:8080"
    environment:
      - ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
